<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Moss Louvan monogram">
  <defs>
    <filter id="soft-glow" x="-55%" y="-55%" width="210%" height="210%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="56" result="wideGlow"/>
      <feGaussianBlur stdDeviation="20" in="SourceGraphic" result="tightGlow"/>
      <feMerge>
        <feMergeNode in="wideGlow"/>
        <feMergeNode in="tightGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="edge" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="#8f8f8f" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#000000"/>
  <g filter="url(#soft-glow)" fill="#ffffff">
    <path d="M330 319 L512 462 L694 319 L694 380 L512 522 L330 380 Z"/>
    <path d="M330 415 L504 550 L463 582 L330 475 Z"/>
    <path d="M694 415 L520 550 L561 582 L694 475 Z"/>
    <path d="M330 415 L380 454 L380 625 L330 695 Z"/>
    <path d="M694 415 L644 454 L644 625 L694 695 Z"/>
  </g>
  <g filter="url(#edge)" fill="#ffffff">
    <path d="M330 319 L512 462 L694 319 L694 380 L512 522 L330 380 Z"/>
    <path d="M330 415 L504 550 L463 582 L330 475 Z"/>
    <path d="M694 415 L520 550 L561 582 L694 475 Z"/>
    <path d="M330 415 L380 454 L380 625 L330 695 Z"/>
    <path d="M694 415 L644 454 L644 625 L694 695 Z"/>
  </g>
</svg>
